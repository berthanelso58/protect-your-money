<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防诈卫士 AI - 全球情报与模拟演练</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      background-color: #000;
      color: #f8fafc;
      overflow-x: hidden;
    }
    .glass-morphism {
      background: rgba(20, 20, 25, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    @keyframes car-zoom {
      0% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); }
      100% { transform: scale(0.5) translateY(-500px); opacity: 0; filter: blur(10px); }
    }
    @keyframes message-in {
      0% { transform: translateY(50px) scale(0.9); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    .animate-car-zoom {
      animation: car-zoom 0.8s cubic-bezier(0.45, 0, 0.55, 1) forwards;
    }
    .animate-message-in {
      animation: message-in 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards;
    }
    .animate-shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
    .ios-shadow {
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .imessage-bubble {
      position: relative;
      padding: 12px 16px;
      border-radius: 20px;
      margin-bottom: 4px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 17px;
      line-height: 1.35;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .imessage-received {
      background-color: #e9e9eb;
      color: black;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      margin-left: 8px;
    }
    .imessage-received::before {
      content: "";
      position: absolute;
      z-index: 0;
      bottom: 0;
      left: -7px;
      height: 20px;
      width: 20px;
      background-color: #e9e9eb;
      border-bottom-right-radius: 15px;
    }
    .imessage-received::after {
      content: "";
      position: absolute;
      z-index: 1;
      bottom: 0;
      left: -10px;
      height: 20px;
      width: 10px;
      background-color: white; /* Matches message body background */
      border-bottom-right-radius: 10px;
    }
    .message-link {
      color: #007aff;
      text-decoration: underline;
      word-break: break-all;
    }
    .ios-status-bar {
      font-feature-settings: "tnum" on, "lnum" on;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes zoom-in {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-in {
      animation-duration: 0.3s;
      animation-fill-mode: both;
    }
    .fade-in {
      animation-name: fade-in;
    }
    .zoom-in-95 {
      animation-name: zoom-in;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.36.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
